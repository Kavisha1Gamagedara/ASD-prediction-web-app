version: '3.8'

services:
  server:
    build: 
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - AI_SERVICE_URL=http://ai_service:8000
    depends_on:
      - ai_service

  client:
    build: 
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - server

  ai_service:
    build: 
      context: ./ai_service
    ports:
      - "8000:8000"
